<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - City Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Menu</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
    </nav>
    <h1>Contact Us</h1>
    <div class="contact-info">
        <p><strong>Phone:</strong> <a href="https://wa.me/201010252168" target="_blank">01010252168 (WhatsApp)</a></p>
        <p><strong>Email:</strong> <a href="mailto:hello@citycafe.com">hello@citycafe.com</a></p>
        <p><strong>Address:</strong> Giza 6 October - El Hussary</p>
    </div>
    <form onsubmit="return validateForm()">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <span class="error" id="nameError">Name is required.</span>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <span class="error" id="emailError">Email is required.</span>
        <label for="message">Message:</label>
        <textarea rows="5" id="message" name="message"></textarea>
        <span class="error" id="messageError">Message is required.</span>
        <button type="submit">Send</button>
    </form>
    <script src="script.js"></script>
</body>

</html>
